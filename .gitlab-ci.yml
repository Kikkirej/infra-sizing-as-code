stages:
  - build
  - web-editor

build-docs:
  image: infra-sizing-builder
  script:
    - python3 build.py
  artifacts:
    paths:
      - output/*.pdf
      - output/documents.zip
    when: always

web-editor-backend:
  stage: web-editor
  image: python:3.11-slim
  script:
    - pip install -r src/web-editor/backend/requirements.txt
    - pytest src/web-editor/backend/

web-editor-frontend:
  stage: web-editor
  image: node:20-alpine
  script:
    - cd src/web-editor/frontend
    - npm ci
    - npm run test:unit
