services:
  backend:
    build:
      context: ./src/web-editor/backend
    ports:
      - "8000:8000"
    volumes:
      - ./infra:/repo/infra
      - ./theme.yml:/repo/theme.yml
      - ./.git:/repo/.git
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ./src/web-editor/backend:/app
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - REPO_ROOT=/repo
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/repo
    restart: unless-stopped

  frontend:
    build:
      context: ./src/web-editor/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src/web-editor/frontend/src:/app/src
      - ./src/web-editor/frontend/index.html:/app/index.html
    depends_on:
      - backend
    restart: unless-stopped
