name: Build Infrastructure Sizing Documents

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t infra-sizing-builder .

      - name: Run build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            infra-sizing-builder \
            python3 build.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: documents
          path: |
            output/*.pdf
            output/documents.zip

  web-editor-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r src/web-editor/backend/requirements.txt

      - name: Run backend tests
        run: pytest src/web-editor/backend/

  web-editor-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: cd src/web-editor/frontend && npm ci

      - name: Run frontend tests
        run: cd src/web-editor/frontend && npm run test:unit
